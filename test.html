<!doctype html>
<html>
  <head>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js"></script>
  </head>
  <body
    style="
      background: dimgray;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    "
  >
    <div id="turnstile-widget">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="120"
        height="30"
        viewBox="0 0 120 30"
        fill="#fff"
      >
        <circle cx="15" cy="15" r="15">
          <animate
            attributeName="r"
            from="15"
            to="15"
            begin="0s"
            dur="0.8s"
            values="15;9;15"
            calcMode="linear"
            repeatCount="indefinite"
          />
          <animate
            attributeName="fill-opacity"
            from="1"
            to="1"
            begin="0s"
            dur="0.8s"
            values="1;.5;1"
            calcMode="linear"
            repeatCount="indefinite"
          />
        </circle>
        <circle cx="60" cy="15" r="9" fill-opacity="0.3">
          <animate
            attributeName="r"
            from="9"
            to="9"
            begin="0s"
            dur="0.8s"
            values="9;15;9"
            calcMode="linear"
            repeatCount="indefinite"
          />
          <animate
            attributeName="fill-opacity"
            from="0.5"
            to="0.5"
            begin="0s"
            dur="0.8s"
            values=".5;1;.5"
            calcMode="linear"
            repeatCount="indefinite"
          />
        </circle>
        <circle cx="105" cy="15" r="15">
          <animate
            attributeName="r"
            from="15"
            to="15"
            begin="0s"
            dur="0.8s"
            values="15;9;15"
            calcMode="linear"
            repeatCount="indefinite"
          />
          <animate
            attributeName="fill-opacity"
            from="1"
            to="1"
            begin="0s"
            dur="0.8s"
            values="1;.5;1"
            calcMode="linear"
            repeatCount="indefinite"
          />
        </circle>
      </svg>
    </div>
    <script type="text/javascript">
      turnstile.render("#turnstile-widget", {
        sitekey: "0x4AAAAAAAA8g8NphwaSOT59",
        theme: "light",
        callback: function (token) {
          chrome.webview.hostObjects.shared.SetResult(token);
          console.log(token);
        },
      });
      setTimeout(() => location.reload(), 40000);
    </script>
  </body>
</html>
